<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Optimizer Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        
        .homey-view {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .device-selector {
            margin-bottom: 30px;
            padding: 20px;
            background: var(--homey-background-highlight);
            border-radius: 8px;
        }
        
        .device-selector h2 {
            margin-top: 0;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .device-button {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            background: var(--homey-background);
            border: 2px solid var(--homey-divider);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        
        .device-button:hover {
            border-color: var(--homey-text-highlight);
            background: var(--homey-background-highlight);
        }
        
        .device-button.active {
            border-color: var(--homey-text-highlight);
            background: var(--homey-background-highlight);
        }
        
        .device-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--homey-text);
            margin-bottom: 4px;
        }
        
        .device-status {
            font-size: 13px;
            color: var(--homey-text-secondary);
        }
        
        .homey-card {
            margin-bottom: 20px;
            padding: 20px;
            background: var(--homey-background);
            border-radius: 8px;
            border: 1px solid var(--homey-divider);
        }
        
        .homey-card h2 {
            margin-top: 0;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .status-grid {
            display: grid;
            gap: 12px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--homey-background-highlight);
            border-radius: 8px;
        }
        
        .status-item.active {
            border-left: 4px solid var(--homey-text-highlight);
        }
        
        .status-item.charging {
            border-left: 4px solid #FFA500;
        }
        
        .status-label {
            font-weight: 500;
            color: var(--homey-text-secondary);
        }
        
        .status-value {
            font-weight: 600;
            color: var(--homey-text);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        
        .info-item {
            text-align: center;
            padding: 16px;
            background: var(--homey-background-highlight);
            border-radius: 8px;
        }
        
        .info-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--homey-text-highlight);
            margin-bottom: 4px;
        }
        
        .info-label {
            font-size: 11px;
            color: var(--homey-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-hero {
            padding: 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0, 160, 255, 0.12), rgba(255, 215, 0, 0.10));
            border: 1px solid rgba(0, 160, 255, 0.2);
            margin-bottom: 16px;
        }

        .summary-hero.positive {
            border-color: rgba(0, 160, 255, 0.35);
        }

        .summary-hero.neutral {
            border-color: rgba(128, 128, 128, 0.35);
        }

        .summary-eyebrow {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--homey-text-secondary);
            margin-bottom: 8px;
        }

        .summary-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--homey-text);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .summary-detail {
            color: var(--homey-text-secondary);
            line-height: 1.5;
        }

        .summary-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .summary-panel {
            padding: 14px;
            background: var(--homey-background-highlight);
            border-radius: 8px;
        }

        .summary-panel-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--homey-text-secondary);
            margin-bottom: 6px;
        }

        .summary-panel-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--homey-text);
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .summary-panel-subtext {
            font-size: 13px;
            color: var(--homey-text-secondary);
            line-height: 1.45;
        }
        
        .timeline {
            margin-top: 12px;
        }
        
        .timeline-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: var(--homey-background-highlight);
            border-radius: 6px;
            border-left: 3px solid var(--homey-divider);
        }
        
        .timeline-item.cheap {
            border-left-color: var(--homey-text-highlight);
        }
        
        .timeline-item.expensive {
            border-left-color: #ff4444;
        }
        
        .timeline-time {
            font-weight: 600;
            min-width: 120px;
            font-size: 13px;
            color: var(--homey-text);
        }
        
        .timeline-price {
            flex: 1;
            text-align: center;
            color: var(--homey-text-secondary);
            font-size: 13px;
        }
        
        .timeline-action {
            font-weight: 500;
            font-size: 13px;
            color: var(--homey-text-highlight);
        }
        
        .timeline-action.discharge {
            color: #ff4444;
        }
        
        .chart-container {
            margin-top: 16px;
            height: 240px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            position: relative;
            padding: 8px;
            display: flex;
            flex-direction: column;
            overflow-x: auto;
        }
        
        .chart-wrapper {
            display: flex;
            flex: 1;
            gap: 8px;
            min-width: 1000px;
        }
        
        .chart-y-axis {
            position: relative;
            min-width: 55px;
            padding-right: 8px;
            font-size: 11px;
            color: var(--homey-text-secondary);
        }
        
        .chart-y-label {
            text-align: right;
            white-space: nowrap;
        }
        
        .chart-bars-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chart-bars {
            display: flex;
            align-items: flex-end;
            flex: 1;
            gap: 1px;
            position: relative;
        }
        
        .chart-avg-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 2px dashed #000000;
            opacity: 0.8;
            pointer-events: none;
        }
        
        .chart-avg-label {
            position: absolute;
            right: 4px;
            top: -10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            color: #ffffff;
            font-weight: 600;
        }
        
        .chart-x-axis {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font-size: 11px;
            color: var(--homey-text-secondary);
            padding: 0 2px;
        }

        .chart-legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .chart-legend-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: var(--homey-background-highlight);
            border-radius: 8px;
        }

        .chart-legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            flex: 0 0 auto;
            margin-top: 2px;
            background: #888;
        }

        .chart-legend-swatch.cheap {
            background: #00a0ff;
        }

        .chart-legend-swatch.charging {
            background: #FFD700;
        }

        .chart-legend-swatch.charging-solar {
            background: #3CB371;
        }

        .chart-legend-swatch.charging-mixed {
            background: linear-gradient(135deg, #FFD700 0%, #FFD700 50%, #3CB371 50%, #3CB371 100%);
        }

        .chart-legend-swatch.expensive {
            background: #ff4444;
        }

        .chart-legend-swatch.avg-line {
            width: 18px;
            height: 0;
            border-top: 2px dashed #000000;
            border-radius: 0;
            background: transparent;
            margin-top: 8px;
        }

        .chart-legend-copy {
            min-width: 0;
        }

        .chart-legend-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--homey-text);
            margin-bottom: 2px;
        }

        .chart-legend-detail {
            font-size: 12px;
            line-height: 1.4;
            color: var(--homey-text-secondary);
        }
        
        .chart-bar {
            flex: 1;
            background: #888;
            opacity: 0.7;
            border-radius: 2px 2px 0 0;
            position: relative;
            transition: opacity 0.2s;
            min-height: 20%;
        }
        
        .chart-bar:hover {
            opacity: 1;
        }
        
        .chart-bar.cheap {
            background: #00a0ff;
            opacity: 0.9;
        }
        
        .chart-bar.expensive {
            background: #ff4444;
            opacity: 0.7;
        }
        
        .chart-bar.charging {
            background: #FFD700;
            opacity: 1;
        }

        .chart-bar.charging-solar {
            background: #3CB371;
            opacity: 1;
        }

        .chart-bar.charging-mixed {
            background: linear-gradient(135deg, #FFD700 0%, #FFD700 50%, #3CB371 50%, #3CB371 100%);
            opacity: 1;
        }
        
        .homey-button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: var(--homey-text-highlight);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .homey-button:hover {
            opacity: 0.8;
        }
        
        .homey-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--homey-text-secondary);
        }
        
        .error {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #ff4444;
            margin-top: 12px;
        }
        
        .no-data {
            text-align: center;
            padding: 24px;
            color: var(--homey-text-secondary);
            font-style: italic;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--homey-text);
            margin: 16px 0 8px 0;
        }

        .planner-section {
            margin-top: 18px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--homey-divider);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.03));
        }

        .planner-section:first-child {
            margin-top: 0;
        }

        .planner-section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .planner-section-kicker {
            margin: 0 0 4px 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--homey-text-secondary);
        }

        .planner-section-heading {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--homey-text);
        }

        .planner-section-note {
            margin: 6px 0 0 0;
            font-size: 13px;
            line-height: 1.45;
            color: var(--homey-text-secondary);
        }

        .planner-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(0, 160, 255, 0.12);
            color: var(--homey-text-highlight);
            font-size: 12px;
            font-weight: 700;
        }

        .planner-stack {
            display: grid;
            gap: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--homey-text-secondary);
        }
        
        .empty-state h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
            color: var(--homey-text);
        }

        @media (max-width: 720px) {
            .homey-view {
                padding: 12px;
            }

            .device-selector,
            .homey-card {
                padding: 16px;
                margin-bottom: 16px;
            }

            .device-button {
                padding: 14px;
            }

            .summary-title {
                font-size: 20px;
            }

            .summary-grid,
            .chart-legend {
                grid-template-columns: 1fr;
            }

            .planner-section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .info-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .status-item,
            .timeline-item {
                align-items: flex-start;
                flex-direction: column;
                gap: 6px;
            }

            .status-value,
            .timeline-price,
            .timeline-action {
                text-align: left;
            }

            .timeline-time {
                min-width: 0;
            }

            .chart-container {
                height: 220px;
                padding: 6px;
            }

            .chart-wrapper {
                min-width: 720px;
            }

            .chart-y-axis {
                min-width: 44px;
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .homey-view {
                padding: 10px;
            }

            .device-selector,
            .homey-card {
                padding: 14px;
                border-radius: 10px;
            }

            .homey-card h2,
            .device-selector h2 {
                font-size: 16px;
            }

            .summary-title {
                font-size: 18px;
            }

            .summary-panel,
            .info-item,
            .chart-legend-item {
                padding: 12px;
            }

            .planner-section {
                padding: 14px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .info-value {
                font-size: 20px;
            }

            .timeline-item {
                padding: 12px;
            }

            .chart-wrapper {
                min-width: 640px;
            }
        }
    </style>
</head>
<body>
    <div class="homey-view">
        <div class="device-selector">
            <h2 id="deviceSelectorTitle">Energy Optimizer Devices</h2>
            <div id="deviceList"></div>
        </div>
        
        <div id="selectedDeviceContainer" hidden>
            <div id="loading" class="loading">Loading optimizer data...</div>
            
            <div id="content" hidden>
                <!-- Dashboard Summary -->
                <div class="homey-card">
                    <h2 id="dashboardSummaryTitle">Dashboard Summary</h2>
                    <div id="dashboardSummaryContainer"></div>
                    <button id="refreshBtn" class="homey-button">Refresh Data</button>
                </div>
                
                <!-- Statistics -->
                <div class="homey-card">
                    <h2 id="technicalDetailsTitle">Technical Details</h2>
                    <div id="statsContainer"></div>
                </div>
                
                <!-- Price Chart -->
                <div class="homey-card">
                    <h2 id="priceChartTitle">Price Chart (Available Data)</h2>
                    <div id="priceChart" class="chart-container">
                        <div class="chart-wrapper">
                            <div class="chart-y-axis" id="chartYAxis"></div>
                            <div class="chart-bars-container">
                                <div class="chart-bars" id="chartBars"></div>
                                <div class="chart-x-axis" id="chartXAxis"></div>
                            </div>
                        </div>
                    </div>
                    <div id="chartLegend" class="chart-legend"></div>
                </div>
                
                <!-- Optimization Plan -->
                <div class="homey-card">
                    <h2 id="optimizationPlanTitle">Optimization Plan</h2>
                    <div id="timelineContainer"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let selectedDeviceId = null;
        let strategy;
        let dashboardSummary;
        let priceCache = [];
        let homeyInstance;
        let autoRefreshInterval = null;

        function t(key, fallback = key) {
            if (homeyInstance && typeof homeyInstance.__ === 'function') {
                try {
                    const translated = homeyInstance.__(key);
                    if (typeof translated === 'string' && translated.length > 0 && translated !== key) {
                        return translated;
                    }
                } catch (error) {
                    console.warn('Translation lookup failed for', key, error);
                }
            }

            return fallback;
        }

        function formatText(key, variables = {}, fallback = '') {
            const template = t(key, fallback);
            return template.replace(/\{(\w+)\}/g, (match, variableName) => {
                if (!Object.prototype.hasOwnProperty.call(variables, variableName)) {
                    return match;
                }

                return String(variables[variableName]);
            });
        }

        function applyStaticTranslations() {
            document.title = t('settings_page.meta.title', 'Energy Optimizer Dashboard');
            document.getElementById('deviceSelectorTitle').textContent = t('settings_page.device_selector.title', 'Energy Optimizer Devices');
            document.getElementById('loading').textContent = t('settings_page.loading', 'Loading optimizer data...');
            document.getElementById('dashboardSummaryTitle').textContent = t('settings_page.sections.dashboard_summary', 'Dashboard Summary');
            document.getElementById('technicalDetailsTitle').textContent = t('settings_page.sections.technical_details', 'Technical Details');
            document.getElementById('priceChartTitle').textContent = t('settings_page.sections.price_chart', 'Price Chart (Available Data)');
            document.getElementById('optimizationPlanTitle').textContent = t('settings_page.sections.optimization_plan', 'Optimization Plan');
            document.getElementById('refreshBtn').textContent = t('settings_page.buttons.refresh', 'Refresh Data');
        }
        
        function onHomeyReady(homey) {
            homeyInstance = homey;
            applyStaticTranslations();
            homey.ready();
            
            loadDeviceList(homey);
        }
        
        async function loadDeviceList(homey) {
            try {
                // Get devices via API instead of homey.getDevices()
                const result = await homey.api('GET', '/devices');
                
                // Filter for energy-optimizer devices
                const optimizerDevices = result.devices.filter(d => 
                    d.driverId === 'energy-optimizer'
                );
                
                const deviceList = document.getElementById('deviceList');
                
                if (optimizerDevices.length === 0) {
                    deviceList.innerHTML = `
                        <div class="empty-state">
                            <h3>${t('settings_page.device_list.empty_title', 'No Energy Optimizer devices found')}</h3>
                            <p>${t('settings_page.device_list.empty_detail', 'Add an Energy Optimizer device to view its optimization data.')}</p>
                        </div>
                    `;
                    return;
                }
                
                deviceList.innerHTML = optimizerDevices.map(device => `
                    <button class="device-button" data-device-id="${device.id}">
                        <div class="device-name">${device.name}</div>
                        <div class="device-status">
                            ${device.status || t('settings_page.device_list.status_unknown', 'Unknown')}
                        </div>
                    </button>
                `).join('');
                
                // Add click handlers
                document.querySelectorAll('.device-button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const deviceId = btn.getAttribute('data-device-id');
                        selectDevice(deviceId);
                        
                        // Update active state
                        document.querySelectorAll('.device-button').forEach(b => 
                            b.classList.remove('active')
                        );
                        btn.classList.add('active');
                    });
                });
                
                // Auto-select first device
                if (optimizerDevices.length > 0) {
                    selectDevice(optimizerDevices[0].id);
                    document.querySelector('.device-button').classList.add('active');
                }
                
            } catch (error) {
                console.error('Error loading devices:', error);
                document.getElementById('deviceList').innerHTML = `
                    <div class="error">${formatText('settings_page.errors.loading_devices', { message: error.message }, 'Error loading devices: {message}')}</div>
                `;
            }
        }
        
        function selectDevice(deviceId) {
            selectedDeviceId = deviceId;
            document.getElementById('selectedDeviceContainer').hidden = false;
            
            // Clear any existing auto-refresh
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            
            // Load data immediately
            loadOptimizerData();
            
            // Setup auto-refresh every 60 seconds to catch battery SoC updates
            autoRefreshInterval = setInterval(() => {
                console.log('Auto-refreshing optimizer data...');
                loadOptimizerData();
            }, 60 * 1000); // Refresh every 60 seconds
            
            // Setup refresh button
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.onclick = () => loadOptimizerData();
        }
        
        async function loadOptimizerData() {
            const refreshBtn = document.getElementById('refreshBtn');
            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.textContent = t('settings_page.buttons.loading', 'Loading...');
            }
            
            document.getElementById('loading').textContent = t('settings_page.loading', 'Loading optimizer data...');
            document.getElementById('loading').hidden = false;
            document.getElementById('content').hidden = true;
            
            try {
                // Get device data via API
                const deviceResult = await homeyInstance.api('GET', `/device/${selectedDeviceId}`);
                const device = deviceResult.device;
                
                if (!device) {
                    throw new Error(t('settings_page.errors.device_not_found', 'Device not found'));
                }
                
                // Get strategy data from API
                try {
                    const result = await homeyInstance.api('GET', `/device/${selectedDeviceId}/strategy`);
                    console.log('Strategy result:', result);
                    strategy = result.strategy || {};
                    dashboardSummary = result.dashboardSummary || null;
                    priceCache = result.priceCache || [];
                    console.log('Price cache length:', priceCache.length);
                    console.log('Strategy:', strategy);
                } catch (apiError) {
                    console.log('Strategy API not available, using limited data', apiError);
                    strategy = {};
                    dashboardSummary = null;
                    priceCache = [];
                }
                
                // Render all sections
                renderDashboardSummary(device, dashboardSummary);
                renderStats(strategy, dashboardSummary);
                renderPriceChart(strategy, priceCache, dashboardSummary, device);
                renderTimeline(strategy, dashboardSummary, device);
                
                // Show content
                document.getElementById('loading').hidden = true;
                document.getElementById('content').hidden = false;
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').hidden = false;
                document.getElementById('content').hidden = true;
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        ${formatText('settings_page.errors.loading_data', { message: error.message }, 'Error loading optimizer data: {message}')}
                    </div>
                `;
            } finally {
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.textContent = t('settings_page.buttons.refresh', 'Refresh Data');
                }
            }
        }
        
        function getOptimizerUiState(device, summary) {
            const deviceEnabled = device?.capabilities?.onoff;
            const summaryEnabled = summary?.optimizer?.enabled;
            const optimizerEnabled = typeof summaryEnabled === 'boolean'
                ? summaryEnabled
                : deviceEnabled !== false;

            return {
                optimizerEnabled,
                planPaused: !optimizerEnabled,
                hasLiveMeasurements: !!summary?.optimizer?.hasLiveMeasurements,
            };
        }

        function renderPriceChart(strategy, priceCache, summary, device) {
            console.log('=== renderPriceChart START ===');
            const chartBars = document.getElementById('chartBars');
            const chartYAxis = document.getElementById('chartYAxis');
            const chartXAxis = document.getElementById('chartXAxis');
            renderPriceLegend(summary, device);
            
            if (!priceCache || priceCache.length === 0) {
                chartBars.innerHTML = `<div class="no-data">${t('settings_page.price_chart.no_price_data', 'No price data available')}</div>`;
                chartYAxis.innerHTML = '';
                chartXAxis.innerHTML = '';
                return;
            }
            
            // Get all available intervals (from 14:00 today until 23:45 tomorrow)
            const availableIntervals = priceCache;
            
            if (availableIntervals.length === 0) {
                chartBars.innerHTML = `<div class="no-data">${t('settings_page.price_chart.no_upcoming_data', 'No upcoming price data')}</div>`;
                chartYAxis.innerHTML = '';
                chartXAxis.innerHTML = '';
                return;
            }
            
            // Find min/max for scaling
            const prices = availableIntervals.map(p => p.total);
            const minPrice = Math.min(...prices);
            const maxPrice = Math.max(...prices);
            const priceRange = maxPrice - minPrice;
            
            // Render Y-axis (price scale)
            // Y-axis should match the bar heights (20-100% range)
            const yAxisSteps = 5;
            let yAxisHtml = '';
            for (let i = yAxisSteps; i >= 0; i--) {
                const price = minPrice + (priceRange * i / yAxisSteps);
                // Position labels to match the 20-100% range used by bars
                const position = (i / yAxisSteps) * 80 + 20;
                yAxisHtml += `<div class="chart-y-label" style="position: absolute; bottom: ${position}%; transform: translateY(50%);">€${price.toFixed(3)}</div>`;
            }
            chartYAxis.innerHTML = yAxisHtml;
            
            // Create sets of startsAt timestamps for quick lookup
            const getPlannedChargeSplit = (interval) => {
                if (!interval || typeof interval !== 'object') {
                    return { gridKWh: 0, solarKWh: 0 };
                }

                let gridKWh = Number.isFinite(interval.plannedGridEnergyKWh) ? interval.plannedGridEnergyKWh : 0;
                let solarKWh = Number.isFinite(interval.plannedSolarEnergyKWh) ? interval.plannedSolarEnergyKWh : 0;

                if (Array.isArray(interval.plannedChargeParts) && interval.plannedChargeParts.length > 0) {
                    gridKWh += interval.plannedChargeParts
                        .filter((part) => part && part.source === 'grid')
                        .reduce((sum, part) => sum + (Number.isFinite(part.energyKWh) ? part.energyKWh : 0), 0);

                    solarKWh += interval.plannedChargeParts
                        .filter((part) => part && part.source === 'solar')
                        .reduce((sum, part) => sum + (Number.isFinite(part.energyKWh) ? part.energyKWh : 0), 0);
                }

                if (gridKWh <= 0 && solarKWh <= 0 && Number.isFinite(interval.plannedEnergyKWh)) {
                    if (interval.plannedEnergySource === 'solar') {
                        solarKWh = interval.plannedEnergyKWh;
                    } else {
                        // Backward compatibility: unknown source defaults to grid.
                        gridKWh = interval.plannedEnergyKWh;
                    }
                }

                return { gridKWh, solarKWh };
            };

            const gridChargeTimestamps = new Set();
            const solarChargeTimestamps = new Set();
            const mixedChargeTimestamps = new Set();
            const EPS_KWH = 0.001;

            (strategy?.chargeIntervals || []).forEach((interval) => {
                if (!interval || !interval.startsAt) return;

                const { gridKWh, solarKWh } = getPlannedChargeSplit(interval);
                const hasGrid = gridKWh > EPS_KWH;
                const hasSolar = solarKWh > EPS_KWH;

                if (hasGrid && hasSolar) {
                    mixedChargeTimestamps.add(interval.startsAt);
                    return;
                }

                if (hasSolar) {
                    solarChargeTimestamps.add(interval.startsAt);
                    return;
                }

                if (hasGrid || (!hasGrid && !hasSolar)) {
                    gridChargeTimestamps.add(interval.startsAt);
                }
            });

            const expensiveTimestamps = new Set(
                getDischargeIntervals(strategy).map(s => s.startsAt)
            );
            
            console.log('Strategy info:', {
                hasStrategy: !!strategy,
                chargeCount: strategy?.chargeIntervals?.length || 0,
                expensiveCount: strategy?.expensiveIntervals?.length || 0,
                cheapThreshold: strategy?.cheapThreshold,
                avgPrice: strategy?.avgPrice,
                firstChargeTime: strategy?.chargeIntervals?.[0]?.startsAt,
                firstExpensiveTime: strategy?.expensiveIntervals?.[0]?.startsAt
            });
            
            // Use avgPrice or calculate it if not available
            const avgPrice = strategy?.avgPrice || (prices.reduce((sum, p) => sum + p, 0) / prices.length);
            const cheapThreshold = strategy?.cheapThreshold || avgPrice * 0.9;
            const expensiveThreshold = strategy?.expensiveThreshold || avgPrice * 1.1;
            
            console.log('Thresholds:', { avgPrice, cheapThreshold, expensiveThreshold });
            
            // Create bars
            let html = '';
            availableIntervals.forEach((priceData, i) => {
                const normalizedHeight = priceRange > 0 
                    ? ((priceData.total - minPrice) / priceRange) * 80 + 20 
                    : 50;
                
                let barClass = 'chart-bar';
                
                // Check by timestamp instead of index
                if (mixedChargeTimestamps.has(priceData.startsAt)) {
                    barClass += ' charging-mixed';
                } else if (solarChargeTimestamps.has(priceData.startsAt)) {
                    barClass += ' charging-solar';
                } else if (gridChargeTimestamps.has(priceData.startsAt)) {
                    barClass += ' charging';
                } else if (expensiveTimestamps.has(priceData.startsAt)) {
                    barClass += ' expensive';
                } else if (priceData.total <= cheapThreshold) {
                    barClass += ' cheap';
                } else if (priceData.total >= expensiveThreshold) {
                    barClass += ' expensive';
                }
                
                html += `<div class="${barClass}" style="height: ${normalizedHeight}%" title="${formatDisplayTime(priceData.startsAt)}: €${priceData.total.toFixed(4)}/kWh"></div>`;
            });
            
            chartBars.innerHTML = html;
            
            // Add average price line
            const avgLinePosition = priceRange > 0
                ? ((avgPrice - minPrice) / priceRange) * 80 + 20
                : 50;
            
            const avgLine = document.createElement('div');
            avgLine.className = 'chart-avg-line';
            avgLine.style.bottom = `${avgLinePosition}%`;
            
            const avgLabel = document.createElement('div');
            avgLabel.className = 'chart-avg-label';
            avgLabel.textContent = formatText('settings_page.price_chart.avg_label', {
                price: avgPrice.toFixed(3),
            }, 'Ø €{price}');
            avgLine.appendChild(avgLabel);
            
            chartBars.appendChild(avgLine);
            
            // Render X-axis (time labels) - show every 6 hours (24 intervals)
            let xAxisHtml = '';
            const timeLabels = [];
            for (let i = 0; i < availableIntervals.length; i += 24) {
                timeLabels.push(formatDisplayTime(availableIntervals[i].startsAt));
            }
            // Add last label
            if (availableIntervals.length > 0) {
                timeLabels.push(formatDisplayTime(availableIntervals[availableIntervals.length - 1].startsAt));
            }
            
            xAxisHtml = timeLabels.map(label => `<span>${label}</span>`).join('');
            chartXAxis.innerHTML = xAxisHtml;
        }

                            <div>
                                <div class="planner-section-kicker">${t('settings_page.timeline.planner_kicker_status', 'Systemstatus')}</div>
                                <h3 class="planner-section-heading">${t('settings_page.timeline.optimizer_paused', 'Optimizer ist pausiert')}</h3>
                                <p class="planner-section-note">${t('settings_page.timeline.optimizer_paused_note', 'Die folgenden Planwerte stammen aus der letzten Berechnung und werden aktuell nicht automatisch ausgefuehrt.')}</p>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Battery Status Section (NEW)
            if (strategy.batteryStatus) {
                const bat = strategy.batteryStatus;
                const socPercent = safeToFixed((bat.currentSoc || 0) * 100, 1);
                const targetPercent = safeToFixed((bat.targetSoc || 0) * 100, 1);
                const availableKWh = safeToFixed(bat.availableCapacity, 2);
                const storedKWh = safeToFixed(bat.storedKWh, 2);
                const batteryFull = (typeof bat.currentSoc === 'number' && typeof bat.targetSoc === 'number')
                    ? bat.currentSoc >= bat.targetSoc
                    : false;
                
                html += `
                    <div class="planner-section">
                        <div class="planner-section-header">
                            <div>
                                <div class="planner-section-kicker">${t('settings_page.timeline.planner_kicker_overview', 'Planübersicht')}</div>
                                <h3 class="planner-section-heading">${t('settings_page.timeline.battery_and_costs', 'Batterie und Energiekosten')}</h3>
                                <p class="planner-section-note">${t('settings_page.timeline.battery_and_costs_note', 'Die wichtigsten Speicher- und Kostendaten für den aktuellen Optimierungsplan.')}</p>
                            </div>
                        </div>
                        <div class="planner-stack">
                    <div class="status-item ${batteryFull ? 'charging' : 'active'}" style="margin-bottom: 16px;">
                        <div style="width: 100%;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span class="status-label">${t('settings_page.timeline.charge_level', 'Ladestand')}:</span>
                                <span class="status-value">${formatText('settings_page.timeline.charge_level_value', {
                                    current: socPercent,
                                    target: targetPercent,
                                }, '{current}% (Target: {target}%)')}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span class="status-label">${t('settings_page.timeline.stored_energy', 'Gespeicherte Energie')}:</span>
                                <span class="status-value">${storedKWh} kWh</span>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span class="status-label">${t('settings_page.timeline.free_capacity', 'Freier Ladeplatz bis Ziel')}:</span>
                                <span class="status-value">${availableKWh} kWh ${batteryFull ? t('settings_page.timeline.target_reached_warning', '⚠️ Batterie liegt bereits am Zielwert') : ''}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                // Display battery energy cost information
                if (bat.energyCost) {
                    const cost = bat.energyCost;
                    const isEstimated = cost.isEstimated || false;
                    const trackedKWh = (typeof cost.trackedKWh === 'number' && Number.isFinite(cost.trackedKWh)) ? cost.trackedKWh : 0;
                    const unknownKWh = (typeof cost.unknownKWh === 'number' && Number.isFinite(cost.unknownKWh)) ? cost.unknownKWh : 0;
                    const hasMixedData = trackedKWh > 0.01 && unknownKWh > 0.01;
                    
                    let label = '💰 Avg. Battery Energy Cost:';
                    let subtitle = '';
                    
                    if (hasMixedData) {
                        label = t('settings_page.timeline.avg_battery_energy_cost_measured_label', '💰 Durchschnittlicher Energiepreis in der Batterie:');
                        subtitle = formatText('settings_page.timeline.mixed_subtitle', {
                            tracked: safeToFixed(trackedKWh, 2),
                            unknown: safeToFixed(unknownKWh, 2),
                            unknownPrice: safeToFixed(cost.unknownAvgPrice, 4, '?'),
                        }, 'Teilweise gemessen: {tracked} kWh bekannt, {unknown} kWh geschaetzt zu {unknownPrice} €/kWh.');
                    } else if (isEstimated) {
                        label = t('settings_page.timeline.avg_battery_energy_cost_estimated_label', '💰 Geschaetzter Energiepreis in der Batterie:');
                        subtitle = t('settings_page.timeline.estimated_subtitle', '⚠️ Der Ursprung der Batterieladung ist noch nicht vollstaendig bekannt.');
                    } else {
                        label = t('settings_page.timeline.avg_battery_energy_cost_measured_label', '💰 Durchschnittlicher Energiepreis in der Batterie:');
                        subtitle = t('settings_page.timeline.measured_subtitle', '✅ Basierend auf den erfassten Lade- und Entladevorgaengen.');
                    }
                    
                    html += `
                        <div class="status-item" style="margin-bottom: 16px; ${isEstimated ? 'opacity: 0.85;' : ''}">
                            <div style="width: 100%;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                    <span class="status-label">${label}</span>
                                    <span class="status-value">${safeToFixed(cost.avgPrice, 4)} €/kWh</span>
                                </div>
                                ${subtitle ? `<div style="font-size: 0.85em; color: ${hasMixedData ? '#3498db' : '#f39c12'}; margin-bottom: 4px;">${subtitle}</div>` : ''}
                                <div style="display: flex; justify-content: space-between; font-size: 0.9em; color: #888; margin-top: 4px;">
                                    <span>${formatText('settings_page.timeline.solar_share', {
                                        energy: safeToFixed(cost.solarKWh, 2),
                                        percent: safeToFixed(cost.solarPercent, 0),
                                    }, '☀️ Solar: {energy} kWh ({percent}%)')}</span>
                                    <span>${formatText('settings_page.timeline.grid_share', {
                                        energy: safeToFixed(cost.gridKWh, 2),
                                        percent: safeToFixed(cost.gridPercent, 0),
                                    }, '⚡ Grid: {energy} kWh ({percent}%)')}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // Show info when no energy cost data is available
                    html += `
                        <div class="status-item" style="margin-bottom: 16px; opacity: 0.7;">
                            <div style="width: 100%;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                    <span class="status-label">${t('settings_page.timeline.avg_battery_energy_cost_unknown_label', '💰 Energiepreis in der Batterie:')}</span>
                                    <span class="status-value" style="color: #888;">${t('settings_page.timeline.no_data_yet', 'Noch keine Daten')}</span>
                                </div>
                                <div style="font-size: 0.9em; color: #888; margin-top: 4px;">
                                    ${t('settings_page.timeline.no_data_info', 'ℹ️ Die Kostenerfassung beginnt, sobald erstmals Ladevorgänge erfasst werden.')}
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                // Planned charge price is computed in backend (UI only renders)
                if (strategy.plannedCharging && typeof strategy.plannedCharging.avgPriceEurPerKWh === 'number' && Number.isFinite(strategy.plannedCharging.avgPriceEurPerKWh)) {
                    html += `
                        <div class="status-item" style="margin-bottom: 16px;">
                            <div style="width: 100%;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                    <span class="status-label">${t('settings_page.timeline.planned_avg_charge_price', '💰 Geplanter durchschnittlicher Ladepreis:')}</span>
                                    <span class="status-value">${strategy.plannedCharging.avgPriceEurPerKWh.toFixed(4)} €/kWh</span>
                                </div>
                                <div style="font-size: 0.9em; color: #888; margin-top: 4px;">
                                    ${t('settings_page.timeline.planned_avg_charge_price_info', 'Dieser Wert basiert auf dem geplanten Mix aus Netz- und Solarladung.')}
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                html += `
                        </div>
                    </div>
                `;
            }
            
            // Planned charging timeline (UI renders backend-provided entries)
            const chargeEntries = Array.isArray(strategy.chargeDisplayEntries)
                ? strategy.chargeDisplayEntries
                : [];

            if (chargeEntries.length > 0 || (strategy.chargeIntervals && strategy.chargeIntervals.length > 0)) {
                // Debug: Show first charge interval info
                const firstInterval = (chargeEntries[0] || strategy.chargeIntervals[0]);
                const firstTimeStr = formatDisplayDateTime(firstInterval.startsAt);
                
                html += `
                    <div class="planner-section">
                        <div class="planner-section-header">
                            <div>
                                <div class="planner-section-kicker">${t('settings_page.timeline.planner_kicker_plan', 'Optimierungsplan')}</div>
                                <h3 class="planner-section-heading">${t('settings_page.timeline.planned_windows', 'Geplante Ladefenster')}</h3>
                                <p class="planner-section-note">${t('settings_page.timeline.planned_windows_note', 'Hier siehst du, wann der Optimizer gezielt günstige Energie für den Speicher einplant.')}</p>
                            </div>
                            <span class="planner-badge">${(chargeEntries.length > 0 ? chargeEntries.length : strategy.chargeIntervals.length)}</span>
                        </div>
                        <div class="planner-stack">
                    <div class="status-item active" style="margin-bottom: 16px;">
                        <span class="status-label">${t('settings_page.timeline.next_planned_window', 'Nächstes geplantes Ladefenster')}:</span>
                        <span class="status-value">${firstTimeStr}</span>
                    </div>
                `;
                html += '<div class="timeline">';

                const displayEntries = (chargeEntries.length > 0 ? chargeEntries : strategy.chargeIntervals).slice(0, 12);

                displayEntries.forEach(entry => {
                    const timeStr = formatDisplayTime(entry.startsAt);
                    const dateStr = formatDisplayDate(entry.startsAt);

                    const plannedKWh = (typeof entry.plannedEnergyKWh === 'number' && Number.isFinite(entry.plannedEnergyKWh))
                        ? entry.plannedEnergyKWh
                        : null;

                    const priceEurPerKWh = (typeof entry.plannedPriceEurPerKWh === 'number' && Number.isFinite(entry.plannedPriceEurPerKWh))
                        ? entry.plannedPriceEurPerKWh
                        : null;

                    const priceText = priceEurPerKWh !== null ? `${priceEurPerKWh.toFixed(4)} €/kWh` : '-';

                    html += `
                        <div class="timeline-item cheap">
                            <span class="timeline-time">${dateStr} ${timeStr}</span>
                            <span class="timeline-price">${priceText}</span>
                            <span class="timeline-action">${describePlannedCharge(entry)}${plannedKWh !== null ? ` · ${plannedKWh.toFixed(2)} kWh` : ''}</span>
                        </div>
                    `;
                });

                const totalEntryCount = (chargeEntries.length > 0 ? chargeEntries.length : strategy.chargeIntervals.length);
                if (totalEntryCount > 12) {
                    html += `<div class="no-data">${formatText('settings_page.timeline.more_entries', { count: totalEntryCount - 12 }, '... and {count} more entries')}</div>`;
                }

                if (strategy.plannedCharging && typeof strategy.plannedCharging.totalEnergyKWh === 'number' && Number.isFinite(strategy.plannedCharging.totalEnergyKWh) && strategy.plannedCharging.totalEnergyKWh > 0) {
                    html += `
                        <div class="status-item" style="margin-top: 12px;">
                            <span class="status-label">${t('settings_page.timeline.load_plan_total', 'Ladeplan gesamt')}:</span>
                            <span class="status-value">${formatText('settings_page.timeline.load_plan_total_value', {
                                energy: strategy.plannedCharging.totalEnergyKWh.toFixed(2),
                                price: strategy.plannedCharging.avgPriceEurPerKWh.toFixed(4),
                                total: strategy.plannedCharging.totalCostEur.toFixed(2),
                            }, '{energy} kWh zu Ø {price} €/kWh = €{total}')}</span>
                        </div>
                    `;
                }
                
                html += '</div></div></div>';
            } else {
                html += `
                    <div class="planner-section">
                        <div class="planner-section-header">
                            <div>
                                <div class="planner-section-kicker">${t('settings_page.timeline.planner_kicker_plan', 'Optimierungsplan')}</div>
                                <h3 class="planner-section-heading">${t('settings_page.timeline.planned_windows', 'Geplante Ladefenster')}</h3>
                                <p class="planner-section-note">${t('settings_page.timeline.no_grid_charging_planned', 'Aktuell ist keine Netzladung geplant. Wenn Energie fehlt, wird das Haus direkt aus dem Netz versorgt.')}</p>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Expensive intervals (discharge)
            if (dischargeIntervals.length > 0) {
                html += `
                    <div class="planner-section">
                        <div class="planner-section-header">
                            <div>
                                <div class="planner-section-kicker">${t('settings_page.timeline.planner_kicker_usage', 'Batterienutzung')}</div>
                                <h3 class="planner-section-heading">${t('settings_page.timeline.expensive_times_with_battery_use', 'Teure Zeiten mit Batterienutzung')}</h3>
                                <p class="planner-section-note">${t('settings_page.timeline.expensive_times_note', 'Diese Phasen sind wirtschaftlich genug, um gespeicherte Energie gezielt für den Hausverbrauch zu nutzen.')}</p>
                            </div>
                            <span class="planner-badge">${dischargeIntervals.length}</span>
                        </div>
                        <div class="planner-stack">
                `;
                html += '<div class="timeline">';
                
                const displayIntervals = dischargeIntervals.slice(0, 12);
                
                displayIntervals.forEach(interval => {
                    const timeStr = formatDisplayTime(interval.startsAt);
                    const dateStr = formatDisplayDate(interval.startsAt);
                    const price = interval.total.toFixed(4);
                    const demand = interval.demandKWh || 0;
                    
                    html += `
                        <div class="timeline-item expensive">
                            <span class="timeline-time">${dateStr} ${timeStr}</span>
                            <span class="timeline-price">${price} €/kWh</span>
                            <span class="timeline-action discharge">${describeBatterySupport(demand)}</span>
                        </div>
                    `;
                });
                
                if (dischargeIntervals.length > 12) {
                    html += `<div class="no-data">${formatText('settings_page.timeline.more_intervals', { count: dischargeIntervals.length - 12 }, '... and {count} more intervals')}</div>`;
                }
                
                // Add discharge summary using backend-provided economics (UI stays dumb)
                const forecastedDemand = strategy.forecastedDemand || 0;
                const avgExpensivePrice = dischargeIntervals.reduce((sum, i) => sum + i.total, 0) / dischargeIntervals.length;
                const baselineCost = strategy?.economics?.baselineCost;
                const optimizedCost = strategy?.economics?.optimizedCost;
                const savings = strategy?.economics?.savings ?? strategy?.savings;
                
                html += `
                    <div class="status-item" style="margin-top: 12px;">
                        <span class="status-label">${t('settings_page.timeline.expected_demand_expensive', 'Erwarteter Bedarf in teuren Zeiten')}:</span>
                        <span class="status-value">${formatText('settings_page.timeline.expected_demand_expensive_value', {
                            demand: forecastedDemand.toFixed(1),
                            price: avgExpensivePrice.toFixed(4),
                        }, '{demand} kWh @ avg {price} €/kWh')}</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">${t('settings_page.timeline.without_battery_use', 'Ohne Batterienutzung')}:</span>
                        <span class="status-value">€${(typeof baselineCost === 'number' ? baselineCost : 0).toFixed(2)}</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">${t('settings_page.timeline.with_battery_use', 'Mit Batterienutzung')}:</span>
                        <span class="status-value">€${(typeof optimizedCost === 'number' ? optimizedCost : 0).toFixed(2)}</span>
                    </div>
                    <div class="status-item active">
                        <span class="status-label">${t('settings_page.timeline.estimated_savings', 'Geschätzte Einsparung')}:</span>
                        <span class="status-value">€${Math.max(0, typeof savings === 'number' ? savings : 0).toFixed(2)}</span>
                    </div>
                `;
                
                html += '</div></div></div>';
            }
            
            if (!html) {
                html = `<div class="no-data">${t('settings_page.timeline.no_usable_data', 'Es sind noch keine verwertbaren Plan- oder Batteriedaten verfuegbar.')}</div>`;
            }
            
            container.innerHTML = html;
        }
    </script>
    <script src="/homey.js" data-origin="settings"></script>
</body>
</html>
